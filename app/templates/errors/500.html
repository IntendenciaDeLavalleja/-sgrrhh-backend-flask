<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error interno</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #f8fafc; color: #0f172a; margin: 0; }
    .wrap { max-width: 760px; margin: 8vh auto; padding: 24px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; }
    h1 { margin: 0 0 10px; font-size: 30px; }
    p { margin: 0 0 12px; line-height: 1.5; color: #334155; }
    code { background: #f1f5f9; padding: 2px 6px; border-radius: 6px; }
    a { display: inline-block; margin-top: 10px; color: #1d4ed8; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Algo falló, pero ya fue registrado</h1>
      <p>El servidor encontró un error inesperado al procesar tu solicitud.</p>
      <p>Si vuelve a pasar, comparte este código con soporte: <code>{{ request_id }}</code></p>
      <a href="/admin">Volver al panel</a>
    </section>
  </main>
</body>
</html>
